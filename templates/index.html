<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Otter Coach Pro - Stability Edition</title>
    <style>
        :root { 
            --bg-dark: #121026; --bg-card: #1E1C3A; --primary: #00D2FF; 
            --secondary: #3A7BD5; --text-main: #FFFFFF; --text-sub: #A0A0B5; 
            --accent: #FFD700; --otter-brown: #744A32; --otter-face: #F1D4B6;
        }
        * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; }
        
        /* 修正手機版高度被切掉的問題 */
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; 
            display: flex; justify-content: center; 
            height: 100dvh; /* 動態視窗高度 */
            overflow: hidden; 
        }
        .app-shell { 
            width: 100%; max-width: 480px; height: 100%; display: flex; flex-direction: column; 
            position: relative; background: radial-gradient(circle at top, #231d49 0%, var(--bg-dark) 80%);
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        .top-bar { padding: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .streak { display: flex; gap: 15px; font-weight: bold; font-size: 0.9rem; }

        /* --- 保留可愛海獺動畫 --- */
        .otter-container { display: flex; justify-content: center; margin: 20px 0; }
        .otter { position: relative; width: 140px; height: 160px; animation: float 4s ease-in-out infinite; cursor: pointer; }
        .otter-body { width: 120px; height: 140px; background: var(--otter-brown); border-radius: 60px 60px 30px 30px; position: absolute; left: 10px; top: 10px; }
        .otter-head { width: 100px; height: 90px; background: var(--otter-brown); border-radius: 50px; position: absolute; left: 20px; top: 0px; }
        .otter-face { width: 70px; height: 50px; background: var(--otter-face); border-radius: 30px; position: absolute; left: 15px; top: 30px; z-index: 2; }
        .otter-face::before, .otter-face::after { content: ''; width: 10px; height: 10px; background: #333; border-radius: 50%; position: absolute; top: 10px; }
        .otter-face::before { left: 15px; } .otter-face::after { right: 15px; }
        .otter-nose { width: 12px; height: 8px; background: #000; border-radius: 50%; position: absolute; left: 29px; top: 25px; }
        .otter-muzzle { width: 20px; height: 15px; background: #E6CBB1; border-radius: 50%; position: absolute; left: 25px; top: 28px; }
        .otter-ear { width: 20px; height: 20px; background: var(--otter-brown); border-radius: 50%; position: absolute; top: 5px; }
        .otter-ear.left { left: 15px; } .otter-ear.right { right: 15px; }
        .otter-hand { width: 25px; height: 35px; background: var(--otter-brown); border-radius: 10px; position: absolute; z-index: 3; top: 90px; }
        .otter-hand.left { left: 15px; transform: rotate(15deg); } .otter-hand.right { right: 15px; transform: rotate(-15deg); }
        .otter-shell { width: 35px; height: 30px; background: var(--accent); border-radius: 50%; position: absolute; left: 52px; top: 95px; z-index: 4; box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); animation: shellGlow 2s ease-in-out infinite; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; color: #333; font-weight: bold; }
        .otter-foot { width: 25px; height: 30px; background: var(--otter-brown); border-radius: 10px; position: absolute; bottom: 0; z-index: 1; }
        .otter-foot.left { left: 30px; transform: rotate(-10deg); } .otter-foot.right { right: 30px; transform: rotate(10deg); }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        @keyframes shellGlow { 0%, 100% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); } 50% { box-shadow: 0 0 25px rgba(255, 215, 0, 0.7); } }

        /* 介面佈局 */
        .screen { flex: 1; overflow-y: auto; display: none; flex-direction: column; padding: 0 20px; padding-bottom: 120px; -webkit-overflow-scrolling: touch; }
        .screen.active { display: flex; }
        .screen::-webkit-scrollbar { display: none; }

        .greeting { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 20px; backdrop-filter: blur(10px); }
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-menu { background: var(--bg-card); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; color: white; display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; transition: 0.2s; text-align: center; }

        .bubble { max-width: 85%; padding: 15px; border-radius: 20px; margin-bottom: 15px; line-height: 1.5; font-size: 0.95rem; }
        .user { align-self: flex-end; background: linear-gradient(135deg, var(--secondary), var(--primary)); color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--bg-card); color: white; border-bottom-left-radius: 2px; border: 1px solid rgba(255,255,255,0.05); }
        .trans { font-size: 0.8rem; color: var(--text-sub); margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.1); }
        
        .elsa-card { background: white; color: #333; border-radius: 15px; padding: 15px; margin-top: 10px; width: 100%; box-sizing: border-box; }

        /* 底部導覽列 - 增加 dvh 適應 */
        .bottom-nav { position: absolute; bottom: 0; width: 100%; background: rgba(18, 16, 38, 0.98); backdrop-filter: blur(15px); padding: 10px 0; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); height: 90px; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { color: var(--text-sub); display: flex; flex-direction: column; align-items: center; font-size: 0.75rem; cursor: pointer; gap: 5px; width: 60px; }
        .nav-item.active { color: var(--primary); }
        .record-wrap { position: relative; width: 70px; height: 70px; display: flex; justify-content: center; }
        .record-btn { width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; justify-content: center; align-items: center; font-size: 1.5rem; border: none; cursor: pointer; position: absolute; top: -30px; box-shadow: 0 5px 20px rgba(0, 210, 255, 0.4); touch-action: none; transition: 0.2s; }
        .record-btn.recording { background: #FF4757; transform: scale(1.1); box-shadow: 0 0 20px #FF4757; }
        
        select { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 12px; border-radius: 10px; width: 100%; margin-bottom: 15px; outline: none; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="top-bar">
        <div style="font-size: 1.2rem; cursor: pointer;" onclick="nav('settings')">⚙️</div>
        <div class="streak"><span style="color:#FF9F43">🔥 1</span><span style="color:#9B59B6">💎 0</span></div>
    </div>

    <div id="home" class="screen active">
        <div class="otter-container">
            <div class="otter" onclick="appendUserMsg('Poke Otter!');">
                <div class="otter-ear left"></div><div class="otter-ear right"></div>
                <div class="otter-body"></div>
                <div class="otter-head"><div class="otter-face"><div class="otter-nose"></div><div class="otter-muzzle"></div></div></div>
                <div class="otter-hand left"></div><div class="otter-hand right"></div>
                <div class="otter-shell">貝</div>
                <div class="otter-foot left"></div><div class="otter-foot right"></div>
            </div>
        </div>
        <div class="greeting">
            <h3 data-i18n="hello">你好呀！學習者</h3>
            <p style="color: var(--text-sub); font-size: 0.9rem;" data-i18n="hello_sub">選一個情境開始說話吧</p>
        </div>
        <div class="grid-menu">
            <div class="btn-menu" onclick="startScenario('Travel')"><span data-i18n="menu_travel">✈️ 旅遊通關</span></div>
            <div class="btn-menu" onclick="startScenario('Restaurant')"><span data-i18n="menu_food">🍔 餐廳點餐</span></div>
            <div class="btn-menu" onclick="startScenario('Interview')"><span data-i18n="menu_job">💼 職涯面試</span></div>
            <div class="btn-menu" onclick="startScenario('Pronunciation')"><span data-i18n="menu_pron">🗣️ 發音特訓</span></div>
        </div>
    </div>

    <div id="path" class="screen">
        <div class="path-title"><span data-i18n="path_title">🏃 每日生活美語</span></div>
        <div class="path-step" onclick="startScenario('General')">
            <div class="path-icon">💬</div>
            <div><div style="font-weight: bold; font-size: 0.95rem;">Free Talk</div><div style="font-size: 0.8rem; color: var(--text-sub);" data-i18n="path_desc1">與 AI 老師無壓力對話</div></div>
        </div>
        <div class="path-step" onclick="startScenario('Pronunciation')">
            <div class="path-icon" style="background:rgba(0, 210, 255, 0.2); color:var(--primary);">🎤</div>
            <div><div style="font-weight: bold; font-size: 0.95rem;">Pronunciation Fix</div><div style="font-size: 0.8rem; color: var(--primary);" data-i18n="path_desc2">已解鎖！點擊開始糾音</div></div>
        </div>
    </div>

    <div id="chat" class="screen">
        <div style="text-align: center; color: var(--text-sub); font-size: 0.8rem; margin: 15px 0;" id="chatTitle">Ready</div>
        <div id="chatLog" style="display: flex; flex-direction: column;"></div>
    </div>

    <div id="settings" class="screen">
        <h3 data-i18n="set_title">設定</h3>
        <select id="uiLang" onchange="changeLang()"><option value="zh">繁體中文</option><option value="en">English</option></select>
        <select id="userLevel"><option value="Beginner">A1 Beginner</option><option value="Intermediate" selected>B1 Intermediate</option><option value="Advanced">C1 Advanced</option></select>
        <select id="aiVoice">
            <option value="en-US-AvaNeural">🇺🇸 美國 女聲</option>
            <option value="en-GB-SoniaNeural">🇬🇧 英國 女聲</option>
            <option value="en-AU-NatashaNeural">🇦🇺 澳洲 女聲</option>
            <option value="de-DE-KatjaNeural">🇩🇪 德國 腔</option>
            <option value="de-CH-LeniNeural">🇨🇭 瑞士 腔</option>
        </select>
        <div class="btn-menu" style="background: var(--primary);" onclick="nav('home')"><span data-i18n="btn_save">儲存並返回</span></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="nav('home')">🏠<span data-i18n="nav_home">首頁</span></div>
        <div class="nav-item" onclick="nav('path')">📚<span data-i18n="nav_path">課程</span></div>
        <div class="record-wrap"><button id="recordBtn" class="record-btn">🎙️</button></div>
        <div class="nav-item" onclick="nav('chat')">💬<span data-i18n="nav_chat">對話</span></div>
        <div class="nav-item" onclick="nav('settings')">👤<span data-i18n="nav_me">我的</span></div>
    </div>
</div>

<script>
    const dict = {
        'zh': { 'hello': '你好呀！學習者', 'hello_sub': '選一個情境開始說話吧', 'menu_travel':'✈️ 旅遊通關', 'menu_food':'🍔 餐廳點餐', 'menu_job':'💼 職涯面試', 'menu_pron':'🗣️ 發音特訓', 'nav_home':'首頁', 'nav_path':'課程', 'nav_chat':'對話', 'nav_me':'我的', 'set_title':'設定', 'btn_save':'儲存並返回' },
        'en': { 'hello': 'Hello, Learner!', 'hello_sub': 'What to practice today?', 'menu_travel':'✈️ Travel', 'menu_food':'🍔 Restaurant', 'menu_job':'💼 Interview', 'menu_pron':'🗣️ Pronun', 'nav_home':'Home', 'nav_path':'Course', 'nav_chat':'Chat', 'nav_me':'Profile', 'set_title':'Settings', 'btn_save':'Save' }
    };

    let mediaRecorder, audioChunks = [], currentScenario = "General", isRecording = false;
    const recordBtn = document.getElementById('recordBtn'), chatLog = document.getElementById('chatLog');

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    }

    function changeLang() {
        const l = document.getElementById('uiLang').value;
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const k = el.getAttribute('data-i18n');
            if(dict[l][k]) el.innerText = dict[l][k];
        });
    }

    const startRec = async (e) => {
        e.preventDefault(); if (isRecording) return;
        try {
            // 強化錄音品質：加入雜音消除與自動增益
            const stream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
            });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = processAudio;
            mediaRecorder.start();
            isRecording = true;
            recordBtn.classList.add('recording');
            if(window.navigator.vibrate) window.navigator.vibrate(40);
        } catch (err) { alert("Mic error"); }
    };

    const stopRec = (e) => {
        e.preventDefault(); if (!isRecording) return;
        if (mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop();
            mediaRecorder.stream.getTracks().forEach(t => t.stop());
        }
        isRecording = false;
        recordBtn.classList.remove('recording');
    };

    recordBtn.addEventListener('mousedown', startRec);
    recordBtn.addEventListener('mouseup', stopRec);
    recordBtn.addEventListener('touchstart', startRec, {passive: false});
    recordBtn.addEventListener('touchend', stopRec, {passive: false});

    async function processAudio() {
        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        const formData = new FormData();
        formData.append('file', audioBlob, 'audio.webm');
        try {
            const sttRes = await fetch('/api/transcribe', { method: 'POST', body: formData });
            const sttData = await sttRes.json();
            if (!sttData.text) return;
            appendMsg("You", sttData.text, "user");

            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: sttData.text, scenario: currentScenario, level: document.getElementById('userLevel').value, uiLang: document.getElementById('uiLang').value })
            });
            const data = await res.json();
            appendMsg("Coach", data.reply, "ai", data.translation);

            if (data.feedback && data.feedback.pronunciation) {
                const c = document.createElement('div'); c.className = "elsa-card";
                c.innerHTML = `<div class="word">${data.feedback.pronunciation.word}</div><div style="color:var(--primary);">${data.feedback.pronunciation.ipa}</div><small>${data.feedback.pronunciation.tip}</small>`;
                chatLog.appendChild(c);
            }

            new Audio(`/api/tts?text=${encodeURIComponent(data.reply)}&voice=${document.getElementById('aiVoice').value}`).play();
            chatLog.scrollTop = chatLog.scrollHeight;
        } catch (e) { console.error(e); }
    }

    function startScenario(s) {
        currentScenario = s; nav('chat');
        chatLog.innerHTML = `<div class="bubble ai"><b>Coach</b><br>Welcome! Let's practice ${s}.</div>`;
    }

    function appendMsg(s, t, c, tr) {
        const d = document.createElement('div'); d.className = `bubble ${c}`;
        d.innerHTML = `<b>${s}</b><br>${t}${tr ? `<div class="trans">${tr}</div>` : ''}`;
        chatLog.appendChild(d); chatLog.scrollTop = chatLog.scrollHeight;
    }

    changeLang();
</script>
</body>
</html>
