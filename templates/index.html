<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Otter Coach Pro</title>
    <style>
        :root { 
            --bg-dark: #121026; --bg-card: #1E1C3A; --primary: #00D2FF; 
            --secondary: #3A7BD5; --text-main: #FFFFFF; --text-sub: #A0A0B5; 
            --accent: #FFD700; --otter-brown: #744A32; --otter-face: #F1D4B6;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .app-shell { width: 100%; max-width: 480px; height: 100%; display: flex; flex-direction: column; position: relative; background: radial-gradient(circle at top, #231d49 0%, var(--bg-dark) 80%); }
        
        .top-bar { padding: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .streak { display: flex; gap: 15px; font-weight: bold; font-size: 0.9rem; }
        
        /* 海獺動畫 */
        .otter-container { display: flex; justify-content: center; margin: 20px 0; }
        .otter { position: relative; width: 140px; height: 160px; animation: float 4s ease-in-out infinite; cursor: pointer; }
        .otter-body { width: 120px; height: 140px; background: var(--otter-brown); border-radius: 60px 60px 30px 30px; position: absolute; left: 10px; top: 10px; }
        .otter-head { width: 100px; height: 90px; background: var(--otter-brown); border-radius: 50px; position: absolute; left: 20px; top: 0px; }
        .otter-face { width: 70px; height: 50px; background: var(--otter-face); border-radius: 30px; position: absolute; left: 15px; top: 30px; z-index: 2; }
        .otter-face::before, .otter-face::after { content: ''; width: 10px; height: 10px; background: #333; border-radius: 50%; position: absolute; top: 10px; }
        .otter-face::before { left: 15px; } .otter-face::after { right: 15px; }
        .otter-nose { width: 12px; height: 8px; background: #000; border-radius: 50%; position: absolute; left: 29px; top: 25px; }
        .otter-muzzle { width: 20px; height: 15px; background: #E6CBB1; border-radius: 50%; position: absolute; left: 25px; top: 28px; }
        .otter-ear { width: 20px; height: 20px; background: var(--otter-brown); border-radius: 50%; position: absolute; top: 5px; }
        .otter-ear.left { left: 15px; } .otter-ear.right { right: 15px; }
        .otter-hand { width: 25px; height: 35px; background: var(--otter-brown); border-radius: 10px; position: absolute; z-index: 3; top: 90px; }
        .otter-hand.left { left: 15px; transform: rotate(15deg); } .otter-hand.right { right: 15px; transform: rotate(-15deg); }
        .otter-shell { width: 35px; height: 30px; background: var(--accent); border-radius: 50%; position: absolute; left: 52px; top: 95px; z-index: 4; box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); animation: shellGlow 2s ease-in-out infinite; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; }
        .otter-foot { width: 25px; height: 30px; background: var(--otter-brown); border-radius: 10px; position: absolute; bottom: 0; z-index: 1; }
        .otter-foot.left { left: 30px; transform: rotate(-10deg); } .otter-foot.right { right: 30px; transform: rotate(10deg); }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        @keyframes shellGlow { 0%, 100% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); opacity: 1; } 50% { box-shadow: 0 0 25px rgba(255, 215, 0, 0.7); opacity: 0.9; } }

        /* 介面佈局 */
        .screen { flex: 1; overflow-y: auto; display: none; flex-direction: column; padding: 0 20px; padding-bottom: 80px; }
        .screen.active { display: flex; }
        .screen::-webkit-scrollbar { display: none; }

        .greeting { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 20px; backdrop-filter: blur(10px); }
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-menu { background: var(--bg-card); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; color: white; display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; transition: 0.2s; text-align: center; }
        .btn-menu:active { transform: scale(0.95); }
        
        .path-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .path-step { background: var(--bg-card); padding: 15px; border-radius: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; border-left: 4px solid var(--primary); cursor: pointer; transition: 0.2s; }
        .path-step:active { transform: scale(0.98); }
        .path-icon { width: 35px; height: 35px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; justify-content: center; align-items: center; font-size: 1.2rem; }

        .bubble { max-width: 85%; padding: 15px; border-radius: 20px; margin-bottom: 15px; line-height: 1.5; font-size: 0.95rem; }
        .user { align-self: flex-end; background: linear-gradient(135deg, var(--secondary), var(--primary)); border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--bg-card); border-bottom-left-radius: 2px; border: 1px solid rgba(255,255,255,0.05); }
        .trans { font-size: 0.8rem; color: var(--text-sub); margin-top: 5px; }
        
        .elsa-card { background: white; color: #333; border-radius: 15px; padding: 15px; margin-top: 10px; width: 100%; box-sizing: border-box; }
        .elsa-card .badge { color: #00A3BF; font-weight: bold; font-size: 0.8rem; display: flex; align-items: center; gap: 5px; margin-bottom: 10px; }
        .elsa-card .word { font-size: 1.5rem; font-weight: 800; color: #2C3A47; }
        .elsa-card .ipa { color: #8395a7; font-family: monospace; font-size: 1rem; margin-bottom: 10px; }
        
        .bottom-nav { position: absolute; bottom: 0; width: 100%; background: rgba(18, 16, 38, 0.9); backdrop-filter: blur(15px); padding: 15px 0; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); }
        .nav-item { color: var(--text-sub); display: flex; flex-direction: column; align-items: center; font-size: 0.75rem; cursor: pointer; gap: 5px; }
        .nav-item.active { color: var(--primary); }
        .record-btn { width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; justify-content: center; align-items: center; font-size: 1.5rem; border: none; cursor: pointer; transform: translateY(-20px); transition: 0.2s; box-shadow: 0 5px 20px rgba(0, 210, 255, 0.4); }
        .record-btn.recording { background: #FF4757; box-shadow: 0 0 20px #FF4757; animation: shellGlow 1s infinite; }
        
        select { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 12px; border-radius: 10px; width: 100%; margin-bottom: 15px; outline: none; }
        select option { background: var(--bg-card); color: white;}
    </style>
</head>
<body>

<div class="app-shell">
    <div class="top-bar">
        <div style="font-size: 1.2rem; cursor: pointer;" onclick="nav('settings')">⚙️</div>
        <div class="streak"><span style="color:#FF9F43">🔥 1</span><span style="color:#9B59B6">💎 0</span></div>
    </div>

    <div id="home" class="screen active">
        <div class="otter-container">
            <div class="otter" onclick="appendUserMsg('戳了海獺一下 (Poke)');">
                <div class="otter-ear left"></div><div class="otter-ear right"></div>
                <div class="otter-body"></div>
                <div class="otter-head"><div class="otter-face"><div class="otter-nose"></div><div class="otter-muzzle"></div></div></div>
                <div class="otter-hand left"></div><div class="otter-hand right"></div>
                <div class="otter-shell">貝</div>
                <div class="otter-foot left"></div><div class="otter-foot right"></div>
            </div>
        </div>
        <div class="greeting">
            <h3 style="margin: 0 0 5px 0;" data-i18n="hello">你好呀！學習者</h3>
            <div style="color: var(--text-sub); font-size: 0.9rem;" data-i18n="hello_sub">今天想和海獺老師練習什麼呢？</div>
        </div>
        <div class="grid-menu">
            <div class="btn-menu" onclick="startScenario('Travel')"><span data-i18n="menu_travel">✈️ 旅遊通關</span></div>
            <div class="btn-menu" onclick="startScenario('Restaurant')"><span data-i18n="menu_food">🍔 餐廳點餐</span></div>
            <div class="btn-menu" onclick="startScenario('Interview')"><span data-i18n="menu_job">💼 職涯面試</span></div>
            <div class="btn-menu" onclick="startScenario('Pronunciation')"><span data-i18n="menu_pron">🗣️ 發音特訓</span></div>
        </div>
    </div>

    <div id="path" class="screen">
        <div class="path-title"><span data-i18n="path_title">🏃 每日生活美語</span> <br><span style="font-size:0.8rem; color:var(--text-sub); font-weight:normal;" data-i18n="path_sub">單元 1 · 全新開始</span></div>
        
        <div class="path-step" onclick="startScenario('General')">
            <div class="path-icon">💬</div>
            <div>
                <div style="font-weight: bold; font-size: 0.95rem;">Free Talk (自由閒聊)</div>
                <div style="font-size: 0.8rem; color: var(--text-sub);" data-i18n="path_desc1">與 AI 老師無壓力對話</div>
            </div>
        </div>
        
        <div class="path-step" onclick="startScenario('Pronunciation')">
            <div class="path-icon" style="background: rgba(0, 210, 255, 0.2); color: var(--primary);">🎤</div>
            <div>
                <div style="font-weight: bold; font-size: 0.95rem;">Pronunciation (發音特訓)</div>
                <div style="font-size: 0.8rem; color: var(--primary);" data-i18n="path_desc2">已解鎖！點擊開始糾音</div>
            </div>
        </div>
    </div>

    <div id="chat" class="screen" style="padding-bottom: 100px;">
        <div style="text-align: center; color: var(--text-sub); font-size: 0.8rem; margin-bottom: 15px;" id="chatTitle">Chat</div>
        <div id="chatLog" style="display: flex; flex-direction: column;"></div>
    </div>

    <div id="settings" class="screen">
        <h2 style="margin-top: 0;" data-i18n="set_title">設定</h2>
        
        <label style="color:var(--text-sub); font-size:0.8rem;" data-i18n="set_lang">介面語言 (UI Language)</label>
        <select id="uiLang" onchange="changeLang()">
            <option value="zh">繁體中文</option>
            <option value="en">English</option>
        </select>

        <label style="color:var(--text-sub); font-size:0.8rem;" data-i18n="set_level">目前等級 (Level)</label>
        <select id="userLevel">
            <option value="Beginner">A1 - Beginner</option>
            <option value="Intermediate" selected>B1 - Intermediate</option>
            <option value="Advanced">C1 - Advanced</option>
        </select>

        <label style="color:var(--text-sub); font-size:0.8rem;" data-i18n="set_voice">口音選擇 (Voice Accent)</label>
        <select id="aiVoice">
            <option value="en-US-AvaNeural">🇺🇸 美國 (US) - Female</option>
            <option value="en-US-GuyNeural">🇺🇸 美國 (US) - Male</option>
            <option value="en-GB-SoniaNeural">🇬🇧 英國 (UK) - Female</option>
            <option value="en-GB-RyanNeural">🇬🇧 英國 (UK) - Male</option>
            <option value="en-AU-NatashaNeural">🇦🇺 澳洲 (AU) - Female</option>
            <option value="en-AU-WilliamNeural">🇦🇺 澳洲 (AU) - Male</option>
            <option value="de-DE-KatjaNeural">🇩🇪 德國 (DE) - Female</option>
            <option value="de-DE-ConradNeural">🇩🇪 德國 (DE) - Male</option>
            <option value="de-CH-LeniNeural">🇨🇭 瑞士 (CH) - Female</option>
            <option value="de-CH-JanNeural">🇨🇭 瑞士 (CH) - Male</option>
        </select>
        
        <div class="btn-menu" style="background: var(--primary);" onclick="nav('home')"><span data-i18n="btn_save">儲存並返回</span></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="nav('home')">🏠<span data-i18n="nav_home">首頁</span></div>
        <div class="nav-item" onclick="nav('path')">📚<span data-i18n="nav_path">課程</span></div>
        <button id="recordBtn" class="record-btn">🎙️</button>
        <div class="nav-item" onclick="nav('chat')">💬<span data-i18n="nav_chat">對話</span></div>
        <div class="nav-item" onclick="nav('settings')">👤<span data-i18n="nav_me">我的</span></div>
    </div>
</div>

<script>
    // --- 多國語系字典 (i18n) ---
    const dict = {
        'zh': {
            'hello': '你好呀！學習者', 'hello_sub': '今天想和海獺老師練習什麼呢？',
            'menu_travel': '✈️ 旅遊通關', 'menu_food': '🍔 餐廳點餐', 'menu_job': '💼 職涯面試', 'menu_pron': '🗣️ 發音特訓',
            'path_title': '🏃 每日生活美語', 'path_sub': '單元 1 · 全新開始',
            'path_desc1': '與 AI 老師無壓力對話', 'path_desc2': '已解鎖！點擊開始糾音',
            'set_title': '個人設定', 'set_lang': '介面語言', 'set_level': '目前等級', 'set_voice': '口音選擇', 'btn_save': '儲存並返回',
            'nav_home': '首頁', 'nav_path': '課程', 'nav_chat': '對話', 'nav_me': '我的',
            'status_listen': '🟢 海獺正在聆聽...', 'status_think': '🤔 海獺思考中...', 'status_err': '❌ 發生錯誤'
        },
        'en': {
            'hello': 'Hello, Learner!', 'hello_sub': 'What do you want to practice with Otter today?',
            'menu_travel': '✈️ Travel & Customs', 'menu_food': '🍔 Order Food', 'menu_job': '💼 Job Interview', 'menu_pron': '🗣️ Pronunciation',
            'path_title': '🏃 Daily English', 'path_sub': 'Unit 1 · Fresh Start',
            'path_desc1': 'Free talk with AI', 'path_desc2': 'Unlocked! Tap to start',
            'set_title': 'Settings', 'set_lang': 'Interface Language', 'set_level': 'Current Level', 'set_voice': 'Voice Accent', 'btn_save': 'Save & Return',
            'nav_home': 'Home', 'nav_path': 'Course', 'nav_chat': 'Chat', 'nav_me': 'Profile',
            'status_listen': '🟢 Otter is listening...', 'status_think': '🤔 Otter is thinking...', 'status_err': '❌ Error occurred'
        }
    };

    function changeLang() {
        const lang = document.getElementById('uiLang').value;
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if(dict[lang][key]) el.innerText = dict[lang][key];
        });
    }

    // --- 核心邏輯 ---
    let mediaRecorder, audioChunks = [], currentScenario = "General";
    const recordBtn = document.getElementById('recordBtn'), chatLog = document.getElementById('chatLog');
    
    function nav(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        if(screenId !== 'settings') event.currentTarget.classList.add('active');
    }

    function startScenario(scenario) {
        currentScenario = scenario;
        const lang = document.getElementById('uiLang').value;
        document.getElementById('chatTitle').innerText = `Scenario: ${scenario}`;
        const welcome = lang === 'zh' ? '歡迎！我是海獺教練。按住麥克風開始說話！' : 'Welcome! I am Otter Coach. Hold the mic to speak!';
        chatLog.innerHTML = `<div class="bubble ai"><b>Otter Coach</b><br>Welcome to the session!<div class="trans">${welcome}</div></div>`;
        nav('chat');
    }

    recordBtn.onmousedown = async () => {
        if(!document.getElementById('chat').classList.contains('active')) nav('chat');
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = processAudio;
        mediaRecorder.start();
        recordBtn.classList.add('recording');
        const lang = document.getElementById('uiLang').value;
        document.getElementById('chatTitle').innerText = dict[lang]['status_listen'];
    };

    recordBtn.onmouseup = () => {
        if(mediaRecorder) mediaRecorder.stop();
        recordBtn.classList.remove('recording');
    };

    async function processAudio() {
        const lang = document.getElementById('uiLang').value;
        document.getElementById('chatTitle').innerText = dict[lang]['status_think'];
        const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
        const formData = new FormData();
        formData.append('file', audioBlob, 'audio.wav');

        try {
            const sttRes = await fetch('/api/transcribe', { method: 'POST', body: formData });
            const sttData = await sttRes.json();
            if (!sttData.text) { document.getElementById('chatTitle').innerText = dict[lang]['status_err']; return; }
            
            appendUserMsg(sttData.text);

            const level = document.getElementById('userLevel').value;
            const voice = document.getElementById('aiVoice').value;

            const chatRes = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: sttData.text, scenario: currentScenario, level: level, uiLang: lang })
            });
            const data = await chatRes.json();

            // 確保 AI 說英文，翻譯為中文
            appendAiMsg(data.reply, data.translation);

            // 顯示糾音卡片 (動態語言提示)
            if (data.feedback && data.feedback.pronunciation) appendElsaCard(data.feedback, lang);

            const audio = new Audio(`/api/tts?text=${encodeURIComponent(data.reply)}&voice=${voice}`);
            audio.play();
            document.getElementById('chatTitle').innerText = `Scenario: ${currentScenario}`;

        } catch (e) {
            document.getElementById('chatTitle').innerText = dict[lang]['status_err'];
        }
    }

    function appendUserMsg(text) {
        const div = document.createElement('div'); div.className = "bubble user"; div.innerText = text;
        chatLog.appendChild(div); chatLog.parentElement.scrollTop = chatLog.parentElement.scrollHeight;
    }

    function appendAiMsg(text, trans) {
        const div = document.createElement('div'); div.className = "bubble ai";
        div.innerHTML = `<b>Otter Coach</b><br>${text}<div class="trans">${trans}</div>`;
        chatLog.appendChild(div); chatLog.parentElement.scrollTop = chatLog.parentElement.scrollHeight;
    }

    function appendElsaCard(fb, lang) {
        const title = lang === 'zh' ? '✍ 發音糾正' : '✍ Pronunciation Fix';
        const tipLbl = lang === 'zh' ? '提示' : 'Tip';
        const senLbl = lang === 'zh' ? '句子建議' : 'Suggestion';
        const div = document.createElement('div'); div.className = "elsa-card";
        div.innerHTML = `
            <div class="badge">${title}</div>
            <div class="word">${fb.pronunciation.word}</div>
            <div class="ipa">${fb.pronunciation.ipa}</div>
            <div style="font-size: 0.85rem; color: #555;">💡 <b>${tipLbl}:</b> ${fb.pronunciation.tip}</div>
            ${fb.correction ? `<div style="margin-top:10px; padding-top:10px; border-top:1px dashed #ccc; font-size: 0.8rem; color:#d35400;"><b>${senLbl}:</b> ${fb.correction}</div>` : ""}
        `;
        chatLog.appendChild(div); chatLog.parentElement.scrollTop = chatLog.parentElement.scrollHeight;
    }

    // 初始化預設語言
    changeLang();
</script>
</body>
</html>
