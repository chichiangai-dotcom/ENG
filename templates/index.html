<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Otter Coach Pro - Precision Audio</title>
    <style>
        :root { 
            --bg-dark: #121026; --bg-card: #1E1C3A; --primary: #00D2FF; 
            --secondary: #3A7BD5; --text-main: #FFFFFF; --text-sub: #A0A0B5; 
            --accent: #FFD700; --otter-brown: #744A32; --otter-face: #F1D4B6;
        }
        * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); margin: 0; display: flex; justify-content: center; height: 100dvh; overflow: hidden; }
        .app-shell { width: 100%; max-width: 480px; height: 100%; display: flex; flex-direction: column; position: relative; background: radial-gradient(circle at top, #231d49 0%, var(--bg-dark) 80%); padding-bottom: env(safe-area-inset-bottom); }
        
        .top-bar { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .otter-container { display: flex; justify-content: center; margin: 10px 0; }
        .otter { position: relative; width: 130px; height: 150px; animation: float 4s ease-in-out infinite; }
        .otter-body { width: 110px; height: 130px; background: var(--otter-brown); border-radius: 55px 55px 30px 30px; position: absolute; left: 10px; top: 10px; }
        .otter-head { width: 90px; height: 80px; background: var(--otter-brown); border-radius: 45px; position: absolute; left: 20px; top: 0px; }
        .otter-face { width: 65px; height: 48px; background: var(--otter-face); border-radius: 30px; position: absolute; left: 13px; top: 25px; z-index: 2; }
        .otter-face::before, .otter-face::after { content: ''; width: 8px; height: 8px; background: #333; border-radius: 50%; position: absolute; top: 10px; }
        .otter-face::before { left: 13px; } .otter-face::after { right: 13px; }
        .otter-shell { width: 32px; height: 28px; background: var(--accent); border-radius: 50%; position: absolute; left: 49px; top: 90px; z-index: 4; box-shadow: 0 0 12px var(--accent); display: flex; justify-content: center; align-items: center; font-size: 1rem; color: #333; font-weight: bold; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .screen { flex: 1; overflow-y: auto; display: none; flex-direction: column; padding: 0 20px; padding-bottom: 110px; }
        .screen.active { display: flex; }
        .btn-menu { background: var(--bg-card); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; color: white; display: flex; flex-direction: column; align-items: center; cursor: pointer; text-align: center; }
        
        .bubble { max-width: 85%; padding: 12px 16px; border-radius: 18px; margin-bottom: 12px; line-height: 1.4; font-size: 0.9rem; }
        .user { align-self: flex-end; background: linear-gradient(135deg, var(--secondary), var(--primary)); }
        .ai { align-self: flex-start; background: var(--bg-card); border: 1px solid rgba(255,255,255,0.05); }
        .trans { font-size: 0.75rem; color: var(--text-sub); margin-top: 5px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 5px; }

        .bottom-nav { position: absolute; bottom: 0; width: 100%; background: rgba(18, 16, 38, 0.98); display: flex; justify-content: space-around; align-items: center; height: 85px; padding-bottom: env(safe-area-inset-bottom); border-top: 1px solid rgba(255,255,255,0.05); }
        .nav-item { color: var(--text-sub); display: flex; flex-direction: column; align-items: center; font-size: 0.7rem; gap: 4px; }
        .nav-item.active { color: var(--primary); }
        .record-wrap { position: relative; width: 70px; height: 70px; }
        .record-btn { width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; justify-content: center; align-items: center; font-size: 1.5rem; border: none; position: absolute; top: -25px; box-shadow: 0 5px 20px rgba(0, 210, 255, 0.4); touch-action: none; }
        .record-btn.recording { background: #FF4757; animation: pulse 1s infinite; transform: scale(1.1); }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(255, 71, 87, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); } }
        
        .elsa-card { background: white; color: #333; border-radius: 12px; padding: 12px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="top-bar">
        <div onclick="nav('settings')">⚙️</div>
        <div class="streak">🔥 1 💎 0</div>
    </div>

    <div id="home" class="screen active">
        <div class="otter-container"><div class="otter"><div class="otter-body"></div><div class="otter-head"><div class="otter-face"></div></div><div class="otter-shell">貝</div></div></div>
        <div class="greeting"><h3>海獺教練正在聆聽...</h3><p>選擇一個主題，我們開始練習！</p></div>
        <div class="grid-menu">
            <div class="btn-menu" onclick="startScenario('Travel')">✈️ 旅遊通關</div>
            <div class="btn-menu" onclick="startScenario('Interview')">💼 職涯面試</div>
        </div>
    </div>

    <div id="chat" class="screen">
        <div style="text-align: center; color: var(--text-sub); font-size: 0.75rem; margin: 10px 0;" id="chatTitle">Status: Ready</div>
        <div id="chatLog" style="display: flex; flex-direction: column;"></div>
    </div>

    <div id="settings" class="screen">
        <h3>Settings</h3>
        <select id="uiLang"><option value="zh">繁體中文</option><option value="en">English</option></select>
        <select id="aiVoice"><option value="en-US-AvaNeural">🇺🇸 US Female</option><option value="en-GB-SoniaNeural">🇬🇧 UK Female</option></select>
        <div class="btn-menu" style="background: var(--primary);" onclick="nav('home')">Save</div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="nav('home')">🏠<span>首頁</span></div>
        <div class="record-wrap"><button id="recordBtn" class="record-btn">🎙️</button></div>
        <div class="nav-item" onclick="nav('chat')">💬<span>對話</span></div>
    </div>
</div>

<script>
    let mediaRecorder, audioChunks = [], currentScenario = "General", isRecording = false;
    const recordBtn = document.getElementById('recordBtn'), chatLog = document.getElementById('chatLog');

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function startScenario(s) {
        currentScenario = s; nav('chat');
        chatLog.innerHTML = `<div class="bubble ai"><b>Coach</b><br>Welcome to ${s} practice! I'm listening.</div>`;
    }

    // --- 強化版錄音設置 ---
    const startRec = async (e) => {
        e.preventDefault(); if (isRecording) return;
        try {
            // 加入雜音抑制與自動增益
            const stream = await navigator.mediaDevices.getUserMedia({ 
                audio: { 
                    echoCancellation: true, 
                    noiseSuppression: true, 
                    autoGainControl: true,
                    sampleRate: 48000
                } 
            });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = processAudio;
            mediaRecorder.start();
            isRecording = true;
            recordBtn.classList.add('recording');
            document.getElementById('chatTitle').innerText = "🔴 Recording (Speak clearly)...";
        } catch (err) { alert("Mic Error"); }
    };

    const stopRec = (e) => {
        e.preventDefault(); if (!isRecording) return;
        if (mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop();
            mediaRecorder.stream.getTracks().forEach(t => t.stop());
        }
        isRecording = false;
        recordBtn.classList.remove('recording');
    };

    recordBtn.addEventListener('mousedown', startRec);
    recordBtn.addEventListener('mouseup', stopRec);
    recordBtn.addEventListener('touchstart', startRec, {passive: false});
    recordBtn.addEventListener('touchend', stopRec, {passive: false});

    async function processAudio() {
        document.getElementById('chatTitle').innerText = "⏳ Processing Audio...";
        const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
        const formData = new FormData();
        formData.append('file', audioBlob, 'audio.wav');

        try {
            const sttRes = await fetch('/api/transcribe', { method: 'POST', body: formData });
            const sttData = await sttRes.json();
            if (!sttData.text) { document.getElementById('chatTitle').innerText = "Try speaking closer to mic"; return; }
            
            appendMsg("You", sttData.text, "user");

            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: sttData.text, scenario: currentScenario, uiLang: document.getElementById('uiLang').value })
            });
            const data = await res.json();
            appendMsg("Coach", data.reply, "ai", data.translation);

            new Audio(`/api/tts?text=${encodeURIComponent(data.reply)}&voice=${document.getElementById('aiVoice').value}`).play();
            document.getElementById('chatTitle').innerText = "Ready";
            chatLog.scrollTop = chatLog.scrollHeight;
        } catch (e) { document.getElementById('chatTitle').innerText = "Error"; }
    }

    function appendMsg(s, t, c, tr) {
        const d = document.createElement('div'); d.className = `bubble ${c}`;
        d.innerHTML = `<b>${s}</b><br>${t}${tr ? `<div class="trans">${tr}</div>` : ''}`;
        chatLog.appendChild(d); chatLog.scrollTop = chatLog.scrollHeight;
    }
</script>
</body>
</html>
